<section class="source-logos-bar" aria-label="News sources">
  <span class="source-logos-label">Aggregating from {{ site.data.sources.size }}+ sources</span>
  <div class="source-logos-track-wrapper">
    <div class="source-logos-track">
      {% for source in site.data.sources %}
      <img
        src="{{ '/assets/images/sources/' | append: source.logo | relative_url }}"
        alt="{{ source.name }}"
        title="{{ source.name }}"
        class="source-logo-img"
        loading="eager"
        width="80"
        height="24"
      >
      {% endfor %}
      {% for source in site.data.sources %}
      <img
        src="{{ '/assets/images/sources/' | append: source.logo | relative_url }}"
        alt="{{ source.name }}"
        title="{{ source.name }}"
        class="source-logo-img"
        loading="eager"
        width="80"
        height="24"
        aria-hidden="true"
      >
      {% endfor %}
    </div>
  </div>
</section>
