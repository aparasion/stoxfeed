<section class="topic-filter-panel" aria-label="Browse by topic">

    <a href="/topics/" class="topic-pill{% unless page.topic %} active{% endunless %}">All</a>

    <a href="/topics/operations/" class="topic-pill{% if page.topic == 'operations' %} active{% endif %}">Operations</a>
    <a href="/topics/governance/" class="topic-pill{% if page.topic == 'governance' %} active{% endif %}">Governance</a>
    <a href="/topics/market/" class="topic-pill{% if page.topic == 'market' %} active{% endif %}">Market</a>
    <a href="/topics/strategy/" class="topic-pill{% if page.topic == 'strategy' %} active{% endif %}">Strategy</a>
  </div>
</section>
