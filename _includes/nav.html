<nav class="site-nav" aria-label="Primary navigation">
  <ul id="site-menu">
    {% assign nav_pages = site.pages | where: "nav", true | sort: "nav_order" %}

    {% for p in nav_pages %}
      <li>
        <a href="{{ p.url | relative_url }}"
           class="{% if p.url == page.url %}active{% endif %}">
          {{ p.title }}
        </a>
      </li>
    {% endfor %}

    <li>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle color theme">
        <span class="toggle-icon toggle-icon--light" aria-hidden="true">☀︎</span>
        <span class="toggle-icon toggle-icon--dark" aria-hidden="true">◗</span>
      </button>
    </li>
  </ul>
</nav>
