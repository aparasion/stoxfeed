<nav class="site-nav" aria-label="Primary navigation">
  <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="site-menu">
    <span class="hamburger-bar"></span>
    <span class="hamburger-bar"></span>
    <span class="hamburger-bar"></span>
  </button>
  <ul id="site-menu">
    {% assign nav_pages = site.pages | where: "nav", true | sort: "nav_order" %}

    {% for p in nav_pages %}
      <li>
        <a href="{{ p.url | relative_url }}"
           class="{% if p.url == page.url %}active{% endif %}">
          {{ p.title }}
        </a>
      </li>
    {% endfor %}

    <li class="theme-menu" id="theme-menu">
      <button class="theme-menu-trigger" id="theme-menu-trigger" aria-label="Choose color theme" aria-haspopup="true" aria-expanded="false">
        <span class="theme-icon" id="theme-current-icon" aria-hidden="true">☀︎</span>
      </button>
      <div class="theme-menu-dropdown" id="theme-menu-dropdown" role="menu">
        <button class="theme-option" data-theme-value="light" role="menuitem">
          <span class="option-icon" aria-hidden="true">☀︎</span> Light
        </button>
        <button class="theme-option" data-theme-value="gray" role="menuitem">
          <span class="option-icon" aria-hidden="true">◑</span> Gray
        </button>
        <button class="theme-option" data-theme-value="dark" role="menuitem">
          <span class="option-icon" aria-hidden="true">◗</span> Dark
        </button>
      </div>
    </li>
  </ul>
</nav>
