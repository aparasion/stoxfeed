name: Daily News Gists

on:
  schedule:
    - cron: "0 0,6,12,18 * * *"  # 01:00, 07:00, 13:00, 19:00 CET (UTC+1)
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for proper git diff / commit history

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser trafilatura openai requests

      - name: Generate gists
        run: python scripts/generate_gists.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}    # ← fixed: use correct secret name

      - name: Update signal statuses
        run: python scripts/update_signal_status.py

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add _posts/ seen.json _data/signals.yml
          if ! git diff --cached --quiet; then
            git commit -m "Update AI news gists - $(date +%Y-%m-%d)"
            git push
          else
            echo "No changes to commit"
          fi
