name: Daily Briefs

on:
  schedule:
    - cron: '0 20 * * 1-5'  # 20:00 UTC, Monday through Friday
  workflow_dispatch:
    inputs:
      date:
        description: "Date to summarize (YYYY-MM-DD). Leave blank for today."
        required: false
        type: string
      force:
        description: "Generate even if brief already exists"
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  generate-daily-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai

      - name: Generate daily brief
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          INPUT_DATE: ${{ github.event.inputs.date }}
          INPUT_FORCE: ${{ github.event.inputs.force }}
        run: |
          set -euo pipefail

          args=()
          if [ -n "${INPUT_DATE:-}" ]; then
            if ! [[ "$INPUT_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
              echo "Error: 'date' must be in YYYY-MM-DD format, got: $INPUT_DATE" >&2
              exit 1
            fi
            args+=(--date "$INPUT_DATE")
          fi

          if [ "${INPUT_FORCE:-false}" = "true" ]; then
            args+=(--force)
          fi

          python scripts/generate_daily_brief.py "${args[@]}"

      - name: Commit and push changes
        id: commit
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add _posts/

          if ! git diff --cached --quiet; then
            git commit -m "Add daily brief - $(date +%Y-%m-%d)"
            git push
            echo "new_brief=true" >> "$GITHUB_OUTPUT"
          else
            echo "No daily brief changes to commit"
            echo "new_brief=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send daily newsletter
        if: steps.commit.outputs.new_brief == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: python scripts/send_newsletter.py --days 1 --send
