name: Update Market Tickers

on:
  schedule:
    # Run Mon-Fri at 21:30 UTC (after US market close at 16:00 ET)
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update-tickers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch market tickers
        run: python scripts/fetch_tickers.py

      - name: Commit updated tickers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/tickers.json
          if git diff --cached --quiet; then
            echo "No ticker changes to commit"
          else
            git commit -m "Update market tickers $(date -u +%Y-%m-%d)"
            git push
          fi
