name: Weekly Newsletter

on:
  schedule:
    - cron: '0 10 * * 1'  # Every Monday at 10:00 UTC
  workflow_dispatch:
    inputs:
      days:
        description: "Number of days to look back (default: 7)"
        required: false
        default: '7'
        type: string
      mode:
        description: "Newsletter action"
        required: true
        default: 'draft'
        type: choice
        options:
          - draft
          - preview
          - send

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai

      - name: Generate and send newsletter
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          INPUT_DAYS: ${{ github.event.inputs.days }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
        run: |
          set -euo pipefail

          args=()
          if [ -n "${INPUT_DAYS:-}" ]; then
            if ! [[ "$INPUT_DAYS" =~ ^[0-9]+$ ]]; then
              echo "Error: 'days' must be a positive integer, got: $INPUT_DAYS" >&2
              exit 1
            fi
            args+=(--days "$INPUT_DAYS")
          fi

          mode="${INPUT_MODE:-draft}"
          if [ "$mode" = "preview" ]; then
            args+=(--dry-run)
          elif [ "$mode" = "send" ]; then
            args+=(--send)
          fi

          python scripts/send_newsletter.py "${args[@]}"
