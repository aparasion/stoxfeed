name: Daily Newsletter (manual)

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Date of the brief to send (YYYY-MM-DD, default: today)"
        required: false
        type: string
      mode:
        description: "Newsletter action"
        required: true
        default: 'draft'
        type: choice
        options:
          - draft
          - preview
          - send

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Send newsletter
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          INPUT_DATE: ${{ github.event.inputs.date }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
        run: |
          set -euo pipefail

          args=()
          if [ -n "${INPUT_DATE:-}" ]; then
            if ! [[ "$INPUT_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
              echo "Error: 'date' must be in YYYY-MM-DD format, got: $INPUT_DATE" >&2
              exit 1
            fi
            args+=(--date "$INPUT_DATE")
          fi

          mode="${INPUT_MODE:-draft}"
          if [ "$mode" = "preview" ]; then
            args+=(--dry-run)
          elif [ "$mode" = "send" ]; then
            args+=(--send)
          fi

          python scripts/send_newsletter.py "${args[@]}"
